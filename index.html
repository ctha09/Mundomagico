<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Mágico | Tienda Infantil</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink-notorious: #ffd6e7; 
            --text-pink-soft: #ffb1cb; 
            --primary-pink: #ff80ab;
            --card-shadow: rgba(255, 128, 171, 0.2);
        }

        body {
            background-color: var(--bg-pink-notorious);
            background-image: radial-gradient(circle, currentColor 15%, transparent 16%);
            background-size: 55px 55px;
            font-family: 'Fredoka', sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden;
            animation: cambioColorPuntos 12s infinite linear;
        }

        @keyframes cambioColorPuntos {
            0%   { color: #ff3385; } 16%  { color: #00ff66; }
            33%  { color: #ff0000; } 50%  { color: #00ccff; }
            66%  { color: #00f2ff; } 83%  { color: #ffffff; }
            100% { color: #ff3385; }
        }

        /* --- MENÚ LATERAL --- */
        .menu-btn {
            position: fixed; top: 20px; left: 20px; z-index: 2000; cursor: pointer;
            background: white; padding: 12px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .menu-btn span { display: block; width: 30px; height: 4px; background: var(--primary-pink); margin: 6px 0; border-radius: 2px; }

        .side-menu {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: white; z-index: 1999; transition: 0.5s; padding-top: 80px;
        }
        .side-menu.active { left: 0; }
        .side-menu a {
            display: block; padding: 15px 40px; font-size: 1.4rem; font-weight: 700;
            color: var(--primary-pink); text-decoration: none; cursor: pointer;
        }
        .side-menu a:hover { background: var(--bg-pink-notorious); }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1998; display: none; }
        .menu-overlay.active { display: block; }

        /* --- CONTENEDORES --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 10px; padding-bottom: 100px; }

        .logo-infantil {
            font-size: clamp(2.5rem, 8vw, 4rem); text-align: center; margin: 30px 0;
            background: linear-gradient(to right, #ff8a80, #ff80ab, #ea80fc, #8c9eff, #80d8ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow 8s infinite linear; font-weight: 700; cursor: pointer;
        }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* SECCIONES VISIBLES/OCULTAS */
        #seccion-inicio { text-align: center; }
        .bienvenida-texto { color: white; text-shadow: 2px 2px var(--primary-pink); font-size: 1.5rem; margin-top: 20px; }

        .carousel-outer {
            width: 100%; height: 400px; border-radius: 40px; overflow: hidden; border: 8px solid white;
            background: white; margin-bottom: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        #slider { display: flex; height: 100%; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        #slider img { min-width: 100%; height: 100%; object-fit: cover; }

        #catalogo { display: none; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 35px; overflow: hidden; border: 4px solid white; text-align: center; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 220px; object-fit: cover; }

        /* PANEL ADMIN */
        #panel-admin { display: none; background: white; padding: 30px; border-radius: 40px; margin-bottom: 40px; border: 4px dashed var(--primary-pink); position: relative; }
        .btn-cerrar-admin { position: absolute; top: 15px; right: 15px; background: #ffebf2; color: var(--primary-pink); border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 20px; }
        input, select, button { font-family: 'Fredoka'; width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: 1px solid #eee; box-sizing: border-box; }
        .btn-action { background: var(--primary-pink); color: white; border: none; cursor: pointer; font-weight: bold; }

        .floating-admin { position: fixed; bottom: 30px; right: 30px; background: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; z-index: 1000; border: 3px solid var(--primary-pink); }
    </style>
</head>
<body>

<div class="menu-btn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
</div>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
<nav class="side-menu" id="sideMenu">
    <a onclick="navegar('inicio')">🏠 Inicio</a>
    <a onclick="navegar('todos')">✨ Ver Todo</a>
    <a onclick="navegar('bebe')">👶 Bebé</a>
    <a onclick="navegar('ninos')">🎈 Niños</a>
    <a onclick="navegar('colegial')">🎒 Colegial</a>
</nav>

<div class="container">
    <h1 class="logo-infantil" onclick="navegar('inicio')">Mundo Mágico</h1>
    
    <!-- SECCIÓN INICIO -->
    <div id="seccion-inicio">
        <div class="carousel-outer">
            <div id="slider"></div>
        </div>
        <div class="bienvenida-texto">
            <h2>¡Bienvenidos a nuestro mundo de colores! 🌈</h2>
            <p>Explora nuestras categorías en el menú lateral</p>
        </div>
    </div>

    <!-- PANEL ADMIN -->
    <div id="panel-admin">
        <button class="btn-cerrar-admin" onclick="cerrarPanel()">← Volver</button>
        <div class="admin-grid">
            <div>
                <h3>👗 Nuevo Producto</h3>
                <input type="text" id="p-nombre" placeholder="Nombre">
                <input type="number" id="p-precio" placeholder="Precio $">
                <select id="p-categoria">
                    <option value="bebe">Bebé</option>
                    <option value="ninos">Niños</option>
                    <option value="colegial">Colegial</option>
                </select>
                <input type="file" id="p-foto" accept="image/*">
                <button class="btn-action" onclick="subirProducto()">Publicar</button>
            </div>
            <div>
                <h3>🖼️ Gestión Carrusel</h3>
                <input type="file" id="c-foto" accept="image/*">
                <button class="btn-action" onclick="subirCarrusel()">Subir Foto</button>
            </div>
        </div>
    </div>

    <!-- SECCIÓN CATÁLOGO -->
    <h2 id="titulo-seccion" style="text-align: center; color: var(--primary-pink); margin: 20px 0; text-transform: uppercase; display: none;"></h2>
    <div id="catalogo"></div>
</div>

<div class="floating-admin" onclick="accesoEditor()">⚙️</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    
    // Configuración Supabase
    const supabase = createClient('https://zvmcjmjbedwaftejdduu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2bWNqbWpiZWR3YWZ0ZWpkZHV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTI4NDksImV4cCI6MjA5MTc4ODg0OX0.Hm4zcGTr04pY13yOXQx26wR_D6GW-Ry5yiSrWTy556k');

    const TIENDA_ID = 'mundo_magico';
    let todosLosProductos = [];

    // --- NAVEGACIÓN Y MENÚ ---
    window.toggleMenu = () => {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    };

    window.navegar = (destino) => {
        const sideMenu = document.getElementById('sideMenu');
        if(sideMenu.classList.contains('active')) toggleMenu();

        const inicio = document.getElementById('seccion-inicio');
        const catalogo = document.getElementById('catalogo');
        const titulo = document.getElementById('titulo-seccion');

        if(destino === 'inicio') {
            inicio.style.display = 'block';
            catalogo.style.display = 'none';
            titulo.style.display = 'none';
        } else {
            inicio.style.display = 'none';
            catalogo.style.display = 'grid';
            titulo.style.display = 'block';
            
            if(destino === 'todos') {
                renderizar(todosLosProductos);
                titulo.innerText = "Nuestro Catálogo Completo";
            } else {
                renderizar(todosLosProductos.filter(p => p.categoria === destino));
                titulo.innerText = "Sección: " + destino;
            }
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // --- CARGA DE DATOS ---
    async function init() {
        await cargarCarrusel();
        await cargarProductos();
    }

    async function cargarCarrusel() {
        const { data } = await supabase.from('carrusel').select('*').eq('tienda_id', TIENDA_ID);
        if (data && data.length > 0) {
            document.getElementById('slider').innerHTML = data.map(f => `<img src="${f.imagen_url}">`).join('');
            let i = 0; 
            setInterval(() => { 
                i = (i + 1) % data.length; 
                document.getElementById('slider').style.transform = `translateX(-${i * 100}%)`; 
            }, 5000);
        }
    }

    async function cargarProductos() {
        const { data } = await supabase.from('productos').select('*').eq('tienda_id', TIENDA_ID).order('created_at', {ascending: false});
        todosLosProductos = data || [];
    }

    function renderizar(lista) {
        document.getElementById('catalogo').innerHTML = lista.map(p => `
            <div class="card">
                <img src="${p.imagen_url}">
                <div style="padding:15px">
                    <h3>${p.nombre}</h3>
                    <strong style="color:var(--primary-pink); font-size:1.4rem">$${p.precio}</strong>
                </div>
            </div>
        `).join('');
    }

    // --- FUNCIONES ADMIN (CRUD) ---
    window.accesoEditor = () => { if(prompt("Clave:") === "1234") document.getElementById('panel-admin').style.display = 'block'; };
    window.cerrarPanel = () => { document.getElementById('panel-admin').style.display = 'none'; };

    window.subirProducto = async () => {
        const nombre = document.getElementById('p-nombre').value;
        const precio = document.getElementById('p-precio').value;
        const categoria = document.getElementById('p-categoria').value;
        const fotoFile = document.getElementById('p-foto').files[0];

        if (!nombre || !precio || !fotoFile) {
            alert("Por favor completa todos los campos");
            return;
        }

        try {
            const fileName = `${Date.now()}_${fotoFile.name}`;
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('productos')
                .upload(fileName, fotoFile);

            if (uploadError) throw uploadError;

            const { data: urlData } = supabase.storage.from('productos').getPublicUrl(fileName);
            const imagen_url = urlData.publicUrl;

            const { error: insertError } = await supabase.from('productos').insert([{
                nombre, precio: parseFloat(precio), categoria, imagen_url, tienda_id: TIENDA_ID
            }]);

            if (insertError) throw insertError;
            alert("Producto guardado!");
            location.reload();
        } catch (e) { alert("Error al subir: " + e.message); }
    };

    window.subirCarrusel = async () => {
        const fotoFile = document.getElementById('c-foto').files[0];
        if (!fotoFile) return alert("Selecciona una foto");

        try {
            const fileName = `banner_${Date.now()}`;
            await supabase.storage.from('carrusel').upload(fileName, fotoFile);
            const { data: urlData } = supabase.storage.from('carrusel').getPublicUrl(fileName);
            
            await supabase.from('carrusel').insert([{ imagen_url: urlData.publicUrl, tienda_id: TIENDA_ID }]);
            alert("Carrusel actualizado!");
            location.reload();
        } catch (e) { alert("Error: " + e.message); }
    };

    init();
</script>
</body>
</html>
