<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITTLE SOCIETY | Mundo Mágico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #5A5A5A;
            --accent: #FFB7C5;
            --secondary: #AEC6CF;
            --bg-light: #FDFCF0;
            --card-bg: #FFFFFF;
            --mint: #B2E2D2;
            --white: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--primary);
            background: var(--bg-light);
            overflow-x: hidden;
        }

        /* --- LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-logo { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; color: var(--secondary); letter-spacing: 5px; }
        .loader-hidden { opacity: 0; visibility: hidden; }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--white);
            border-bottom: 4px solid var(--secondary);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1rem; color: var(--secondary); }
        .nav-controls { display: flex; align-items: center; gap: 15px; }

        .settings-btn { width: 28px; height: 28px; cursor: pointer; transition: transform 0.5s; }
        .settings-btn:hover { transform: rotate(90deg); }
        .settings-btn svg { fill: var(--secondary); width: 100%; height: 100%; }

        .contact-btn {
            background: var(--accent); color: white; padding: 8px 18px;
            border-radius: 25px; text-decoration: none;
            font-weight: bold; font-size: 0.75rem;
        }

        /* --- MODAL ADMIN --- */
        #admin-modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .admin-content {
            background: white; padding: 30px; border-radius: 30px;
            width: 90%; max-width: 400px; position: relative;
        }
        .admin-content input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: 1px solid #eee; border-radius: 12px; box-sizing: border-box;
        }
        .admin-content button {
            width: 100%; padding: 12px; border: none;
            border-radius: 12px; background: var(--mint);
            color: white; font-weight: bold; cursor: pointer;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; color: #ccc; }

        /* --- CARRUSEL --- */
        .carousel-container {
            width: 90%; max-width: 1100px;
            margin: 20px auto; height: 350px;
            border-radius: 30px; overflow: hidden;
            position: relative;
        }
        .carousel-inner { display: flex; height: 100%; transition: transform 0.7s ease; }
        .slide {
            min-width: 100%; display: flex; align-items: flex-end; padding: 40px;
            background-size: cover; background-position: center;
            position: relative; overflow: hidden;
        }
        .slide h2 {
            background: rgba(255, 255, 255, 0.8); color: var(--secondary);
            padding: 10px 20px; border-radius: 15px; font-size: 1.2rem;
            z-index: 2; position: relative;
        }
        .s1 { background-image: url('https://images.unsplash.com/photo-1519234110453-da21005f4a7c?q=80&w=1200'); }
        .s2 { background-image: url('https://images.unsplash.com/photo-1522771935876-249711cdca02?q=80&w=1200'); }
        
        /* Imagen Borrosa Artística */
        .s3 { 
            background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200');
        }
        .s3::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: inherit; filter: blur(6px); transform: scale(1.1); z-index: 1;
        }

        /* --- GRID --- */
        .container { width: 95%; max-width: 1100px; margin: 30px auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card {
            background: var(--white); border-radius: 20px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); position: relative;
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; }
        .card-info h3 { font-size: 0.8rem; margin: 5px 0; font-weight: 400; }
        .price { color: var(--accent); font-weight: bold; font-size: 1rem; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">MUNDO_MÁGICO</div>
    </div>

    <header>
        <div class="logo">MUNDO_MÁGICO</div>
        <div class="nav-controls">
            <div class="settings-btn" id="open-admin">
                <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.85,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </div>
            <a href="https://wa.me/tu-numero" class="contact-btn">WhatsApp</a>
        </div>
    </header>

    <div id="admin-modal">
        <div class="admin-content">
            <span class="close-modal" id="close-admin">&times;</span>
            <h4 style="color: var(--secondary); font-family: 'Syncopate'; font-size: 0.9rem;">NUEVA PRENDA</h4>
            <input type="text" id="p-nombre" placeholder="Nombre (ej: Gorrito Lana)">
            <input type="number" id="p-precio" placeholder="Precio ($)">
            <input type="text" id="p-img" placeholder="URL de la imagen">
            <button id="btn-add">PUBLICAR EN TIENDA</button>
        </div>
    </div>

    <section class="carousel-container">
        <div class="carousel-inner" id="carousel">
            <div class="slide s1"><h2>SOFT_COLLECTION</h2></div>
            <div class="slide s2"><h2>STREET_STYLE</h2></div>
            <div class="slide s3"><h2>MUNDO MÁGICO</h2></div>
        </div>
    </section>

    <div class="container">
        <h2 style="font-family: 'Syncopate'; font-size: 0.8rem; color: var(--secondary); margin-bottom: 20px;">NUESTRO STOCK</h2>
        <div class="grid" id="product-grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración Mundo Mágico
        const firebaseConfig = {
            apiKey: "AIzaSyAnxydDNTP15DqDKBfM8CEU1j42kwxrjjc",
            authDomain: "mundo-magico-c2476.firebaseapp.com",
            projectId: "mundo-magico-c2476",
            storageBucket: "mundo-magico-c2476.firebasestorage.app",
            messagingSenderId: "659897627792",
            appId: "1:659897627792:web:602377c729525164d1f56b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "productos");

        // Modal Admin
        const modal = document.getElementById('admin-modal');
        document.getElementById('open-admin').onclick = () => modal.style.display = 'flex';
        document.getElementById('close-admin').onclick = () => modal.style.display = 'none';

        // Publicar Producto
        document.getElementById('btn-add').onclick = async () => {
            const nombre = document.getElementById('p-nombre').value;
            const precio = document.getElementById('p-precio').value;
            const imagen = document.getElementById('p-img').value;

            if(nombre && precio && imagen) {
                await addDoc(colRef, { nombre, precio, imagen, fecha: Date.now() });
                modal.style.display = 'none';
                alert("¡Prenda publicada!");
            }
        };

        // Escuchar Stock en tiempo real
        const q = query(colRef, orderBy("fecha", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="card animate__animated animate__fadeInUp">
                        <img src="${p.imagen}" alt="${p.nombre}">
                        <div class="card-info">
                            <h3>${p.nombre}</h3>
                            <span class="price">$${p.precio}</span>
                        </div>
                    </div>
                `;
            });
        });

        // Carrusel y Loader
        window.onload = () => setTimeout(() => document.getElementById("loader").classList.add("loader-hidden"), 1500);
        
        let idx = 0;
        setInterval(() => {
            idx = (idx + 1) % 3;
            document.getElementById('carousel').style.transform = `translateX(-${idx * 100}%)`;
        }, 5000);
    </script>
</body>
</html>
