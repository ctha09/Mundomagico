<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Mágico - Catálogo</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }
        body {
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 40px 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        /* Estilo Glassmorphism para las tarjetas */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-info { padding: 15px; }
        .precio { color: #10b981; font-weight: bold; font-size: 1.2rem; }
        
        #catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Panel Admin */
        #panel-admin {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        input, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            color: white;
        }
        button { background: #3b82f6; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #2563eb; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Mundo Mágico</h1>
        <p>Catálogo Exclusivo</p>
        <button id="open-login" style="width: auto; padding: 5px 15px; font-size: 0.8rem;">Modo Admin</button>
    </div>

    <div id="panel-admin">
        <h3>Añadir Nuevo Producto</h3>
        <input type="text" id="nombre-nuevo" placeholder="Nombre de la prenda">
        <input type="number" id="precio-nuevo" placeholder="Precio">
        <textarea id="desc-nuevo" placeholder="Descripción (talles, colores...)"></textarea>
        <input type="file" id="foto-nueva" accept="image/*">
        <button id="btn-subir">Guardar en Catálogo</button>
    </div>

    <div id="catalogo">
        <p style="text-align: center; grid-column: 1/-1;">Cargando productos...</p>
    </div>
</div>

<div id="modal-login" class="modal">
    <div style="background: #1e293b; padding: 30px; border-radius: 15px; width: 300px;">
        <h3>Acceso Admin</h3>
        <input type="password" id="pass-input" placeholder="Contraseña">
        <button id="btn-entrar">Entrar</button>
        <button id="btn-cerrar" style="background: transparent;">Cancelar</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Configuración Corregida
    const supabaseUrl = 'https://zvmcmjbedwaftejdduu.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2bWNtanJlZHdhZnRlamRkdXUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxMzU2OTQyNCwiZXhwIjoyMDI5MTQ1NDI0fQ.7Z0S8zY3y-3-y_y4-y8zY3y-3-y_y4-y8zY3y-3-y_y4';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const TIENDA_ID = 'mundo_magico';
    const PASS_ADMIN = '1234'; 
    let isAdmin = false;

    // Cargar Productos
    async function cargarProductos() {
        const contenedor = document.getElementById('catalogo');
        try {
            const { data: productos, error } = await supabase
                .from('productos')
                .select('*')
                .eq('tienda_id', TIENDA_ID)
                .order('created_at', { ascending: false });

            if (error) throw error;

            contenedor.innerHTML = '';
            if (productos && productos.length > 0) {
                productos.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="card">
                            <img src="${p.imagen_url}" alt="${p.nombre}" onerror="this.src='https://via.placeholder.com/300x200?text=Sin+Imagen'">
                            <div class="card-info">
                                <h3>${p.nombre}</h3>
                                <p class="precio">$${p.precio}</p>
                                <p>${p.descripcion || ''}</p>
                                ${isAdmin ? `<button onclick="window.borrarProd('${p.id}')" style="background:#ef4444; margin-top:10px;">Eliminar</button>` : ''}
                            </div>
                        </div>
                    `;
                });
            } else {
                contenedor.innerHTML = '<p style="grid-column:1/-1; text-align:center;">No hay productos todavía.</p>';
            }
        } catch (e) {
            contenedor.innerHTML = '<p style="color:red;">Error de conexión. Revisa la consola.</p>';
            console.error(e);
        }
    }

    // Subir Producto
    async function subirProducto() {
        const nombre = document.getElementById('nombre-nuevo').value;
        const precio = document.getElementById('precio-nuevo').value;
        const desc = document.getElementById('desc-nuevo').value;
        const file = document.getElementById('foto-nueva').files[0];

        if (!nombre || !precio || !file) return alert("Completa los datos");

        const btn = document.getElementById('btn-subir');
        btn.innerText = "Subiendo..."; btn.disabled = true;

        try {
            const path = `${TIENDA_ID}/${Date.now()}_${file.name}`;
            const { error: sErr } = await supabase.storage.from('imagenes_tiendas').upload(path, file);
            if (sErr) throw sErr;

            const { data: urlData } = supabase.storage.from('imagenes_tiendas').getPublicUrl(path);

            const { error: dbErr } = await supabase.from('productos').insert([{
                nombre, precio: parseFloat(precio), descripcion: desc, imagen_url: urlData.publicUrl, tienda_id: TIENDA_ID
            }]);
            if (dbErr) throw dbErr;

            alert("¡Subido!");
            location.reload();
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.innerText = "Guardar"; btn.disabled = false;
        }
    }

    // Función global para borrar
    window.borrarProd = async (id) => {
        if(confirm("¿Borrar?")) {
            await supabase.from('productos').delete().eq('id', id);
            cargarProductos();
        }
    }

    // Eventos
    document.addEventListener('DOMContentLoaded', () => {
        cargarProductos();
        document.getElementById('btn-subir').onclick = subirProducto;
        document.getElementById('open-login').onclick = () => document.getElementById('modal-login').style.display='flex';
        document.getElementById('btn-cerrar').onclick = () => document.getElementById('modal-login').style.display='none';
        document.getElementById('btn-entrar').onclick = () => {
            if(document.getElementById('pass-input').value === PASS_ADMIN) {
                isAdmin = true;
                document.getElementById('panel-admin').style.display='block';
                document.getElementById('modal-login').style.display='none';
                cargarProductos();
            } else { alert("Error"); }
        };
    });
</script>

</body>
</html>
