<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Tienda - Mundo Mágico</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Formulario de Carga */
        .admin-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            border: 1px solid #334155;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background: #4f46e5;
        }

        /* Grilla de Productos */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .producto-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: transform 0.3s;
        }

        .producto-card:hover {
            transform: translateY(-5px);
        }

        .producto-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .info {
            padding: 15px;
        }

        .info h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
        }

        .precio {
            color: #22c55e;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Administración de Tienda</h1>

    <div class="admin-panel">
        <h2>Cargar Nuevo Producto</h2>
        <div class="form-group">
            <label>Nombre de la prenda</label>
            <input type="text" id="nombre" placeholder="Ej: Remera Oversize">
        </div>
        <div class="form-group">
            <label>Precio</label>
            <input type="number" id="precio" placeholder="Ej: 5500">
        </div>
        <div class="form-group">
            <label>Foto de la prenda</label>
            <input type="file" id="foto" accept="image/*">
        </div>
        <button id="btn-subir">Subir Producto</button>
    </div>

    <hr style="border: 0.5px solid #334155; margin: 40px 0;">

    <h2>Catálogo Actual</h2>
    <div id="contenedor-productos" class="grid">
        </div>
</div>

<script type="module">
    // 1. IMPORTAR SDK
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // 2. CONFIGURACIÓN (Reemplazá con tus datos de Supabase)
    const supabaseUrl = 'https://TU_PROYECTO.supabase.co'
    const supabaseKey = 'TU_ANON_KEY'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const TIENDA_ID = 'mundo_magico';

    // --- FUNCIÓN PARA CARGAR PRODUCTOS ---
    async function cargarProductos() {
        const { data: productos, error } = await supabase
            .from('productos')
            .select('*')
            .eq('tienda_id', TIENDA_ID)
            .order('created_at', { ascending: false });

        if (error) return console.error("Error:", error);

        const contenedor = document.getElementById('contenedor-productos');
        contenedor.innerHTML = '';

        productos.forEach(item => {
            contenedor.innerHTML += `
                <div class="producto-card">
                    <img src="${item.imagen_url}" alt="${item.nombre}">
                    <div class="info">
                        <h3>${item.nombre}</h3>
                        <p class="precio">$${item.precio}</p>
                    </div>
                </div>
            `;
        });
    }

    // --- FUNCIÓN PARA SUBIR PRODUCTO ---
    async function crearProducto() {
        const nombre = document.getElementById('nombre').value;
        const precio = document.getElementById('precio').value;
        const file = document.getElementById('foto').files[0];

        if (!nombre || !precio || !file) return alert("Completá todos los campos");

        const btn = document.getElementById('btn-subir');
        btn.innerText = "Subiendo...";
        btn.disabled = true;

        try {
            // A. Subir imagen
            const nombreArchivo = `${Date.now()}_${file.name}`;
            const { data: storageData, error: storageError } = await supabase.storage
                .from('imagenes_tiendas')
                .upload(`${TIENDA_ID}/${nombreArchivo}`, file);

            if (storageError) throw storageError;

            // B. URL Pública
            const { data: urlData } = supabase.storage
                .from('imagenes_tiendas')
                .getPublicUrl(`${TIENDA_ID}/${nombreArchivo}`);

            // C. Insertar en tabla
            const { error: dbError } = await supabase
                .from('productos')
                .insert([{ 
                    nombre: nombre, 
                    precio: precio, 
                    imagen_url: urlData.publicUrl, 
                    tienda_id: TIENDA_ID 
                }]);

            if (dbError) throw dbError;

            alert("Producto cargado!");
            document.getElementById('nombre').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('foto').value = '';
            cargarProductos();

        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.innerText = "Subir Producto";
            btn.disabled = false;
        }
    }

    // Event Listeners
    document.getElementById('btn-subir').addEventListener('click', crearProducto);
    document.addEventListener('DOMContentLoaded', cargarProductos);

</script>

</body>
</html>
